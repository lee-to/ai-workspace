name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version-check:
    name: Check release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check tag and CLI version
        run: |
          package_name="$(python3 -c 'import tomllib; data = tomllib.load(open("Cargo.toml", "rb")); print(data["package"]["name"])')"
          package_version="$(python3 -c 'import tomllib; data = tomllib.load(open("Cargo.toml", "rb")); print(data["package"]["version"])')"
          expected_tag="v${package_version}"

          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match Cargo.toml package version ${package_version}. Expected ${expected_tag}."
            exit 1
          fi

          cli_version="$(cargo run --locked --quiet -- --version)"
          expected_cli_version="${package_name} ${package_version}"

          if [ "${cli_version}" != "${expected_cli_version}" ]; then
            echo "::error::CLI version '${cli_version}' does not match expected '${expected_cli_version}'."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: version-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ai-workspace-x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ai-workspace-aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ai-workspace-x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ai-workspace-aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ai-workspace-x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.${{ matrix.archive }} ai-workspace

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = "target/${{ matrix.target }}/release/ai-workspace.exe"
          $archivePath = "${{ matrix.artifact }}.${{ matrix.archive }}"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open($archivePath, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
              $archive,
              $exePath,
              "ai-workspace.exe",
              [System.IO.Compression.CompressionLevel]::NoCompression
            ) | Out-Null
          } finally {
            $archive.Dispose()
          }

      - name: Verify Windows package compatibility
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & ./.github/scripts/verify-windows-zip.ps1 -ZipPath "${{ matrix.artifact }}.${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
